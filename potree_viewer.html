<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Point Cloud Viewer</title>

    <link
      rel="stylesheet"
      type="text/css"
      href="./potree/libs/potree/potree.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="./potree/libs/jquery-ui/jquery-ui.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="./potree/libs/openlayers3/ol.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="./potree/libs/spectrum/spectrum.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="./potree/libs/jstree/themes/mixed/style.css"
    />

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #1a1a2e;
      }

      /* Navigation bar */
      .nav-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10000;
        height: 40px;
        background: rgba(26, 26, 46, 0.95);
        border-bottom: 1px solid #444;
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-family: "Segoe UI", system-ui, sans-serif;
        gap: 16px;
      }
      .nav-bar a {
        color: #4ec9b0;
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .nav-bar a:hover {
        background: rgba(78, 201, 176, 0.15);
      }
      .nav-bar a.active {
        background: rgba(78, 201, 176, 0.2);
        font-weight: 600;
      }
      .nav-bar .title {
        color: #ddd;
        font-size: 14px;
        font-weight: 600;
        margin-right: 12px;
      }

      .potree_container {
        position: absolute;
        width: 100%;
        top: 40px;
        bottom: 0;
        left: 0;
      }
    </style>
  </head>

  <body>
    <div class="nav-bar">
      <span class="title">CIV2</span>
      <a href="/">Map View</a>
      <a href="/pointcloud" class="active">Point Cloud</a>
    </div>

    <div class="potree_container">
      <div id="potree_render_area"></div>
      <div id="potree_sidebar_container"></div>
    </div>

    <script src="./potree/libs/jquery/jquery-3.1.1.min.js"></script>
    <script src="./potree/libs/spectrum/spectrum.js"></script>
    <script src="./potree/libs/jquery-ui/jquery-ui.min.js"></script>
    <script src="./potree/libs/other/BinaryHeap.js"></script>
    <script src="./potree/libs/tween/tween.min.js"></script>
    <script src="./potree/libs/d3/d3.js"></script>
    <script src="./potree/libs/proj4/proj4.js"></script>
    <script src="./potree/libs/openlayers3/ol.js"></script>
    <script src="./potree/libs/i18next/i18next.js"></script>
    <script src="./potree/libs/jstree/jstree.js"></script>
    <script src="./potree/libs/potree/potree.js"></script>
    <script src="./potree/libs/plasio/js/laslaz.js"></script>

    <script>
      window.viewer = new Potree.Viewer(
        document.getElementById("potree_render_area"),
      );

      viewer.setEDLEnabled(true);
      viewer.setFOV(60);
      viewer.setPointBudget(3_000_000);
      viewer.loadSettingsFromURL();

      viewer.setDescription("Above-Ground Assets Point Cloud");

      viewer.loadGUI(() => {
        viewer.setLanguage("en");
        $("#menu_appearance").next().show();
        $("#menu_tools").next().show();
        $("#menu_clipping").next().show();
        viewer.toggleSidebar();
      });

      // Load the converted point cloud (Potree 2.0 format)
      Potree.loadPointCloud(
        "https://storage.googleapis.com/pax-jamaica/potree-data/global_xyz_rgb_icgu_1_0_2000_assets_converted/metadata.json",
        "Above-Ground Assets",
        function (e) {
          let scene = viewer.scene;
          let pointcloud = e.pointcloud;

          let material = pointcloud.material;
          material.size = 1;
          material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
          material.shape = Potree.PointShape.SQUARE;
          material.activeAttributeName = "rgba";

          scene.addPointCloud(pointcloud);

          viewer.fitToScreen();
        },
      );
    </script>
  </body>
</html>
