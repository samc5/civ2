<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP Point Cloud + Asset Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
    canvas { display: block; }

    /* Loading overlay */
    #loading_overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(20,20,20,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #ddd; font-size: 16px;
    }
    #loading_overlay.hidden { display: none; }
    #loading_bar_outer {
      width: 320px; height: 8px; background: #333;
      border-radius: 4px; margin-top: 16px; overflow: hidden;
    }
    #loading_bar { height: 100%; width: 0%; background: #4ec9b0;
      transition: width 0.3s ease; border-radius: 4px; }
    #loading_status { margin-top: 10px; font-size: 13px; color: #aaa; }

    /* Tile selector */
    #tile_selector_panel {
      position: fixed; top: 12px; left: 12px; z-index: 500;
      background: rgba(30,30,30,0.95); border: 1px solid #444;
      border-radius: 8px; padding: 12px 14px; color: #ddd; font-size: 13px;
      max-width: 340px;
    }
    #tile_selector_panel h4 { margin: 0 0 8px; font-size: 14px; color: #4ec9b0;
      border-bottom: 1px solid #333; padding-bottom: 6px; }
    #tile_select {
      width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid #555;
      background: #222; color: #ddd; font-size: 12px; cursor: pointer;
    }
    #tile_info { margin-top: 6px; font-size: 11px; color: #888; }
    #point_size_ctrl { margin-top: 8px; }
    #point_size_ctrl label { font-size: 11px; color: #888; }
    #point_size_slider { width: 100%; }

    /* Asset info panel */
    #info_panel {
      position: fixed; top: 12px; right: 12px; z-index: 500;
      width: 280px; background: rgba(30,30,30,0.95);
      border: 1px solid #444; border-radius: 8px;
      padding: 12px; color: #ddd; font-size: 13px;
      display: none;
    }
    #info_panel.visible { display: block; }
    #info_panel h3 { margin: 0 0 8px; font-size: 14px; color: #4ec9b0; }
    #info_panel img { width: 100%; border-radius: 4px; margin-bottom: 8px;
      max-height: 180px; object-fit: cover; display: block; }
    #info_panel table { width: 100%; border-collapse: collapse; }
    #info_panel td { padding: 2px 6px; vertical-align: top; }
    #info_panel td:first-child { color: #888; white-space: nowrap; width: 40%; }
    #info_close { float: right; cursor: pointer; color: #888; font-size: 16px; }
    #info_close:hover { color: #fff; }

    /* Asset type sidebar */
    #asset_sidebar {
      position: fixed; bottom: 12px; left: 12px; z-index: 400;
      background: rgba(30,30,30,0.92); border: 1px solid #444;
      border-radius: 8px; padding: 10px 14px; color: #ddd;
      max-height: 45vh; overflow-y: auto; font-size: 12px;
      min-width: 200px; max-width: 300px;
    }
    #asset_sidebar h4 { margin: 0 0 8px; font-size: 13px; color: #4ec9b0;
      border-bottom: 1px solid #333; padding-bottom: 6px; }
    .asset_row { display: flex; align-items: center; margin-bottom: 3px; cursor: pointer; }
    .asset_row:hover { background: rgba(255,255,255,0.05); border-radius: 3px; }
    .asset_swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-right: 6px; }
    .asset_label { flex: 1; font-size: 11px; }
    .asset_count { color: #666; margin-left: 4px; font-size: 11px; }
    .asset_row input[type=checkbox] { margin-right: 4px; cursor: pointer; }

    /* Error toast */
    #error_toast {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      z-index: 600; background: #8b0000; color: #fff;
      padding: 10px 18px; border-radius: 6px; font-size: 13px;
      display: none; max-width: 500px; text-align: center;
    }

    /* Controls hint */
    #controls_hint {
      position: fixed; bottom: 12px; right: 12px; z-index: 300;
      background: rgba(0,0,0,0.6); color: #888; font-size: 11px;
      padding: 6px 10px; border-radius: 4px; line-height: 1.5;
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading_overlay">
  <div id="loading_message">Initializing viewer…</div>
  <div id="loading_bar_outer"><div id="loading_bar"></div></div>
  <div id="loading_status"></div>
</div>

<!-- Tile selector -->
<div id="tile_selector_panel">
  <h4>Point Cloud Tile</h4>
  <select id="tile_select"></select>
  <div id="tile_info"></div>
  <div id="point_size_ctrl">
    <label>Point size: <span id="ps_val">1.5</span></label>
    <input id="point_size_slider" type="range" min="0.5" max="8" step="0.5" value="1.5">
  </div>
</div>

<!-- Asset info panel -->
<div id="info_panel">
  <span id="info_close" title="Close">✕</span>
  <h3 id="info_type">—</h3>
  <img id="info_img" src="" alt="" style="display:none">
  <table id="info_table"><tbody></tbody></table>
</div>

<!-- Asset type sidebar -->
<div id="asset_sidebar">
  <h4>Nearby Assets</h4>
  <div id="asset_type_list"></div>
</div>

<!-- Error toast -->
<div id="error_toast"></div>

<!-- Controls hint -->
<div id="controls_hint">
  Left-drag: rotate &nbsp;|&nbsp; Right-drag: pan &nbsp;|&nbsp; Scroll: zoom
</div>

<script>
// =============================================================================
// CONFIGURATION
// =============================================================================
const POTREE_PATH = "../potree";
const CHUNK_SIZE  = 500000; // Points per LAZ decode chunk
const ASSET_RADIUS_M = 150; // Show assets within this distance of tile center
// =============================================================================

const COLOR_MAP = {
  VALVE_COVER: "#e74c3c", MANHOLE_COVER: "#3498db", CATCH_BASIN: "#2980b9",
  RAMP: "#2ecc71", DRIVEWAY: "#f39c12", CURB: "#e67e22", SIDEWALK: "#95a5a6",
  PLANTER: "#27ae60", TRASH_BIN: "#7f8c8d", BUS_STOP: "#f1c40f",
  CABINET: "#d35400", HYDRANT: "#c0392b", CCTV: "#8e44ad", TREE: "#1e8449",
  BUS_SHELTER: "#e91e63", BIKE_RACK: "#00bcd4", BOX: "#795548",
  BENCH: "#a0522d", UTILITY_POLE: "#9e9e9e", SIGNAL_POLE: "#ff9800",
  FENCE: "#bc8f8f", RETAINING_WALL: "#607d8b",
  PEDESTRIAN_PUSH_BUTTON: "#00acc1", TRAFFIC_SIGNAL: "#f44336",
  FLASHER: "#ff4081", LUMINARIES: "#ffd54f", JERSEY_BARRIER: "#bdbdbd",
};

function hexToRgb01(hex) {
  return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
}

// ── UI helpers ──────────────────────────────────────────────────────────
function setMsg(msg, status) {
  document.getElementById("loading_message").textContent = msg;
  if (status !== undefined) document.getElementById("loading_status").textContent = status;
}
function setProgress(pct) {
  document.getElementById("loading_bar").style.width = Math.round(pct) + "%";
}
function hideLoading() { document.getElementById("loading_overlay").classList.add("hidden"); }
function showLoading() { document.getElementById("loading_overlay").classList.remove("hidden"); }
function showError(msg) {
  const el = document.getElementById("error_toast");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 8000);
}

// ── Script loader ───────────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src; s.onload = resolve;
    s.onerror = () => reject(new Error("Failed to load: " + src));
    document.head.appendChild(s);
  });
}

// ── Haversine distance (meters) ─────────────────────────────────────────
function haversineM(lat1, lon1, lat2, lon2) {
  const R = 6371000, toRad = Math.PI / 180;
  const dLat = (lat2 - lat1) * toRad, dLon = (lon2 - lon1) * toRad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── LAZ Loader (Potree's LASLAZWorker → LASDecoderWorker pipeline) ─────
class LAZLoader {
  constructor(potreePath) {
    this.lazWorkerURL = potreePath + "/build/potree/workers/LASLAZWorker.js";
    this.decWorkerURL = potreePath + "/build/potree/workers/LASDecoderWorker.js";
  }

  async load(url, onProgress) {
    onProgress = onProgress || (() => {});
    onProgress(0);

    // 1. Fetch the LAZ file (stream for progress)
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("HTTP " + resp.status + " fetching LAZ");
    const contentLength = +resp.headers.get("Content-Length") || 0;

    let buffer;
    if (contentLength && resp.body) {
      const reader = resp.body.getReader();
      const chunks = []; let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value); received += value.length;
        onProgress(Math.min(45, 45 * received / contentLength));
      }
      buffer = new Uint8Array(received);
      let off = 0;
      for (const c of chunks) { buffer.set(c, off); off += c.length; }
      buffer = buffer.buffer;
    } else {
      buffer = await resp.arrayBuffer();
      onProgress(45);
    }

    // 2. Decompress LAZ → raw point bytes
    const raw = await this._decompress(buffer, p => onProgress(45 + p * 35));

    // 3. Decode raw bytes → positions/colors
    const result = await this._decode(raw, p => onProgress(80 + p * 20));
    onProgress(100);
    return result;
  }

  _decompress(arraybuffer, onProgress) {
    return new Promise((resolve, reject) => {
      const w = new Worker(this.lazWorkerURL);
      let header = null;
      const allChunks = [];
      let total = 0, read = 0;

      w.onmessage = e => {
        const m = e.data;
        if (m.type === "open") {
          if (m.status !== 1) { reject(new Error("LAZ open failed")); w.terminate(); return; }
          w.postMessage({ type: "header" });
        } else if (m.type === "header" && m.header) {
          header = m.header; total = header.pointsCount;
          w.postMessage({ type: "read", start: 0, count: Math.min(CHUNK_SIZE, total), skip: 1 });
        } else if (m.type === "header" && m.buffer) {
          read += m.count;
          allChunks.push({ buffer: m.buffer, count: m.count });
          onProgress(read / total);
          if (m.hasMoreData) {
            w.postMessage({ type: "read", start: read, count: Math.min(CHUNK_SIZE, total - read), skip: 1 });
          } else {
            w.postMessage({ type: "close" });
          }
        } else if (m.type === "close") {
          w.terminate();
          resolve({ header, chunks: allChunks, totalPoints: read });
        }
      };
      w.onerror = e => { reject(e); w.terminate(); };
      w.postMessage({ type: "open", arraybuffer: arraybuffer }, [arraybuffer]);
    });
  }

  _decode({ header, chunks, totalPoints }, onProgress) {
    const ps = header.pointsStructSize;
    const merged = new ArrayBuffer(totalPoints * ps);
    const dst = new Uint8Array(merged);
    let off = 0;
    for (const c of chunks) {
      dst.set(new Uint8Array(c.buffer), off);
      off += c.count * ps;
    }
    return new Promise((resolve, reject) => {
      const w = new Worker(this.decWorkerURL);
      w.onmessage = e => {
        w.terminate(); onProgress(1);
        resolve({
          positions: new Float32Array(e.data.position),
          colors: new Uint8Array(e.data.color),
          intensity: new Float32Array(e.data.intensity),
          mean: e.data.mean,
          tightBoundingBox: e.data.tightBoundingBox,
          numPoints: totalPoints,
          header: header,
        });
      };
      w.onerror = e => { reject(e); w.terminate(); };
      w.postMessage({
        buffer: merged, numPoints: totalPoints, pointSize: ps,
        pointFormatID: header.pointsFormatId,
        scale: header.scale, offset: header.offset, mins: header.mins,
      }, [merged]);
    });
  }
}

// ── Globals ─────────────────────────────────────────────────────────────
let scene, camera, renderer, controls;
let pointCloudObj = null;
let assetGroups = new Map();
let allAssets = null;
let tilesData = null;
let currentTileIdx = -1;
const lazLoader = new LAZLoader(POTREE_PATH);

// ── Main ────────────────────────────────────────────────────────────────
async function init() {
  try {
    setMsg("Loading THREE.js…");
    await loadScript(POTREE_PATH + "/libs/three.js/build/three.min.js");

    setMsg("Setting up scene…");
    setupOrbitControls();

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 10000);
    camera.position.set(0, 0, 50);

    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.screenSpacePanning = true;
    controls.minDistance = 1;
    controls.maxDistance = 2000;

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
    animate();

    // Load metadata
    setMsg("Loading tile index & assets…");
    const [tilesResp, assetsResp] = await Promise.all([
      fetch("pointcloudjp.json").then(r => r.json()),
      fetch("assets_with_tiles.geojson").then(r => r.ok ? r.json() : null),
    ]);
    tilesData = tilesResp;
    allAssets = assetsResp;

    // Populate tile selector
    const sel = document.getElementById("tile_select");
    tilesData.features.forEach((f, i) => {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = "#" + (i+1) + ": " + (f.properties.filename_no_ext || f.properties.filename);
      sel.appendChild(opt);
    });
    sel.addEventListener("change", () => loadTile(+sel.value));

    // Point size slider
    const slider = document.getElementById("point_size_slider");
    slider.addEventListener("input", () => {
      document.getElementById("ps_val").textContent = slider.value;
      if (pointCloudObj) pointCloudObj.material.size = +slider.value;
    });

    document.getElementById("info_close").addEventListener("click", hideInfoPanel);
    renderer.domElement.addEventListener("click", onCanvasClick);

    // Load first tile
    await loadTile(0);

  } catch (err) {
    console.error(err);
    setMsg("Error: " + err.message);
    document.getElementById("loading_message").style.color = "#e74c3c";
  }
}

// ── Load a single tile ──────────────────────────────────────────────────
async function loadTile(idx) {
  if (idx === currentTileIdx) return;
  currentTileIdx = idx;

  const tile = tilesData.features[idx];
  const p = tile.properties;
  const url = p.baseUrl + p.lasPath;

  document.getElementById("tile_select").value = idx;
  document.getElementById("tile_info").innerHTML =
    "<b>" + p.filename + "</b><br>Lat: " + p.lat.toFixed(6) + " &nbsp; Lon: " + p.lon.toFixed(6);

  // Cleanup old
  if (pointCloudObj) {
    scene.remove(pointCloudObj);
    pointCloudObj.geometry.dispose();
    pointCloudObj.material.dispose();
    pointCloudObj = null;
  }
  for (const [, grp] of assetGroups) {
    scene.remove(grp.points);
    grp.points.geometry.dispose();
    grp.points.material.dispose();
  }
  assetGroups.clear();

  showLoading(); setMsg("Downloading tile " + (idx+1) + "…"); setProgress(0);

  try {
    const data = await lazLoader.load(url, pct => {
      setProgress(pct);
      if (pct < 45)      setMsg("Downloading tile " + (idx+1) + "…", Math.round(pct/45*100) + "%");
      else if (pct < 80) setMsg("Decompressing LAZ…", Math.round((pct-45)/35*100) + "%");
      else               setMsg("Decoding points…",   Math.round((pct-80)/20*100) + "%");
    });

    if (currentTileIdx !== idx) return; // switched during load

    setMsg("Building point cloud…");
    buildPointCloud(data);

    if (allAssets) {
      setMsg("Adding nearby assets…");
      addFilteredAssets(p.lat, p.lon);
    }
    hideLoading();
  } catch (err) {
    console.error("Load failed:", err);
    showError("Failed to load tile: " + err.message);
    hideLoading();
  }
}

// ── Build THREE.Points from decoded LAZ ─────────────────────────────────
function buildPointCloud(data) {
  const { positions, colors, numPoints, tightBoundingBox: bb, mean, header } = data;

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

  const hasColor = (header.pointsFormatId === 2 || header.pointsFormatId === 3);
  const colorF = new Float32Array(numPoints * 3);
  if (hasColor) {
    for (let i = 0; i < numPoints; i++) {
      colorF[i*3] = colors[i*4]/255; colorF[i*3+1] = colors[i*4+1]/255; colorF[i*3+2] = colors[i*4+2]/255;
    }
  } else {
    const intens = data.intensity;
    let maxI = 0;
    if (intens) { for (let i = 0; i < numPoints; i++) if (intens[i] > maxI) maxI = intens[i]; }
    if (maxI === 0) maxI = 1;
    for (let i = 0; i < numPoints; i++) {
      const v = intens ? intens[i]/maxI : 0.8;
      colorF[i*3] = v; colorF[i*3+1] = v; colorF[i*3+2] = v;
    }
  }
  geo.setAttribute("color", new THREE.BufferAttribute(colorF, 3));

  const size = +document.getElementById("point_size_slider").value;
  pointCloudObj = new THREE.Points(geo, new THREE.PointsMaterial({
    size, sizeAttenuation: false, vertexColors: true,
  }));
  scene.add(pointCloudObj);

  // Camera
  const cx = mean[0], cy = mean[1], cz = mean[2];
  const dx = bb.max[0]-bb.min[0], dy = bb.max[1]-bb.min[1], dz = bb.max[2]-bb.min[2];
  const ext = Math.max(dx, dy, dz);
  controls.target.set(cx, cy, cz);
  camera.position.set(cx, cy - ext*0.6, cz + ext*0.8);
  camera.up.set(0, 0, 1);
  controls.update();
}

// ── Filtered asset markers ──────────────────────────────────────────────
function addFilteredAssets(tileLat, tileLon) {
  if (!allAssets) return;

  const nearby = allAssets.features.filter(f => {
    const g = f.geometry;
    let lon, lat;
    if (g.type === "Point") { [lon, lat] = g.coordinates; }
    else if (g.type === "LineString") { const c = g.coordinates; [lon, lat] = c[Math.floor(c.length/2)]; }
    else return false;
    return haversineM(tileLat, tileLon, lat, lon) <= ASSET_RADIUS_M;
  });

  if (!nearby.length) {
    document.getElementById("asset_type_list").innerHTML =
      '<div style="color:#666;">No assets within ' + ASSET_RADIUS_M + ' m</div>';
    return;
  }

  const groups = {};
  for (const f of nearby) {
    const t = f.properties.asset_type || "UNKNOWN";
    (groups[t] = groups[t] || []).push(f);
  }

  const pcMean = getMeanFromGeometry();
  const tp = tilesData.features[currentTileIdx].properties;

  for (const [type, features] of Object.entries(groups)) {
    const hex = COLOR_MAP[type] || "#ffffff";
    const rgb = hexToRgb01(hex);
    const count = features.length;
    const pos = new Float32Array(count * 3);
    const col = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
      const g = features[i].geometry;
      let lon, lat;
      if (g.type === "Point") { [lon, lat] = g.coordinates; }
      else if (g.type === "LineString") { const c = g.coordinates; [lon, lat] = c[Math.floor(c.length/2)]; }
      else { lon = tp.lon; lat = tp.lat; }

      const dLon = (lon - tp.lon) * Math.cos(tp.lat * Math.PI / 180) * 111320;
      const dLat = (lat - tp.lat) * 111320;
      pos[i*3] = pcMean[0] + dLon;
      pos[i*3+1] = pcMean[1] + dLat;
      pos[i*3+2] = pcMean[2] + 2;
      col[i*3] = rgb[0]; col[i*3+1] = rgb[1]; col[i*3+2] = rgb[2];
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({
      size: 10, sizeAttenuation: false, vertexColors: true, depthTest: true, depthWrite: false,
    }));
    scene.add(pts);
    assetGroups.set(type, { points: pts, features, hex, count });
  }
  buildSidebar();
}

function getMeanFromGeometry() {
  if (!pointCloudObj) return [0,0,0];
  const p = pointCloudObj.geometry.getAttribute("position");
  const step = Math.max(1, Math.floor(p.count / 1000));
  let sx=0, sy=0, sz=0, n=0;
  for (let i = 0; i < p.count; i += step) { sx += p.getX(i); sy += p.getY(i); sz += p.getZ(i); n++; }
  return [sx/n, sy/n, sz/n];
}

// ── Sidebar ─────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById("asset_type_list");
  list.innerHTML = "";
  const sorted = [...assetGroups.entries()].sort((a,b) => b[1].count - a[1].count);
  for (const [type, group] of sorted) {
    const row = document.createElement("div"); row.className = "asset_row";
    const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = true;
    cb.addEventListener("change", () => { group.points.visible = cb.checked; });
    const sw = document.createElement("div"); sw.className = "asset_swatch"; sw.style.background = group.hex;
    const lb = document.createElement("span"); lb.className = "asset_label"; lb.textContent = type.replace(/_/g, " ");
    const ct = document.createElement("span"); ct.className = "asset_count"; ct.textContent = "(" + group.count + ")";
    row.append(cb, sw, lb, ct); list.appendChild(row);
    row.addEventListener("click", ev => { if (ev.target !== cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event("change")); } });
  }
}

// ── Click → Info panel ──────────────────────────────────────────────────
function onCanvasClick(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  let bestFeat = null, bestDist = Infinity;
  for (const [, group] of assetGroups) {
    if (!group.points.visible) continue;
    const pos = group.points.geometry.getAttribute("position");
    for (let i = 0; i < pos.count; i++) {
      const v = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)).project(camera);
      if (v.z > 1) continue;
      const d = Math.sqrt((v.x-mx)**2 + (v.y-my)**2);
      if (d < bestDist) { bestDist = d; bestFeat = group.features[i]; }
    }
  }
  if (bestFeat && bestDist < 0.04) showInfoPanel(bestFeat); else hideInfoPanel();
}

function showInfoPanel(feature) {
  const p = feature.properties, panel = document.getElementById("info_panel");
  document.getElementById("info_type").textContent = p.asset_type || "Asset";
  const img = document.getElementById("info_img");
  if (p.image_url) { img.src = p.image_url; img.style.display = "block"; }
  else { img.src = ""; img.style.display = "none"; }
  const fields = [["Feature ID",p.feature_id||"—"],["Condition",p.condition||"—"],
    ["Tile",p.tile_file||"—"],["Dataset",p.street_dataset||"—"],["Type",p.Type||"—"],["Material",p.Material||"—"]];
  const tbody = document.querySelector("#info_table tbody"); tbody.innerHTML = "";
  for (const [l, v] of fields) { const tr = document.createElement("tr"); tr.innerHTML = "<td>"+l+"</td><td>"+v+"</td>"; tbody.appendChild(tr); }
  panel.classList.add("visible");
}
function hideInfoPanel() { document.getElementById("info_panel").classList.remove("visible"); }

// ── Inline OrbitControls (minimal) ──────────────────────────────────────
function setupOrbitControls() {
  if (THREE.OrbitControls) return;
  THREE.OrbitControls = function(cam, dom) {
    this.camera = cam; this.domElement = dom; this.target = new THREE.Vector3();
    this.enableDamping = false; this.dampingFactor = 0.05;
    this.screenSpacePanning = true; this.minDistance = 0; this.maxDistance = Infinity;
    this.rotateSpeed = 1.0; this.panSpeed = 1.0;

    let sph = new THREE.Spherical(), sphD = new THREE.Spherical();
    let panOff = new THREE.Vector3(), scale = 1, state = 0;
    let rStart = new THREE.Vector2(), pStart = new THREE.Vector2();

    this.update = () => {
      let off = new THREE.Vector3().copy(cam.position).sub(this.target);
      sph.setFromVector3(off);
      sph.theta += sphD.theta; sph.phi += sphD.phi;
      sph.phi = Math.max(0.001, Math.min(Math.PI - 0.001, sph.phi));
      sph.radius *= scale;
      sph.radius = Math.max(this.minDistance, Math.min(this.maxDistance, sph.radius));
      this.target.add(panOff);
      off.setFromSpherical(sph);
      cam.position.copy(this.target).add(off);
      cam.lookAt(this.target);
      if (this.enableDamping) {
        sphD.theta *= (1 - this.dampingFactor); sphD.phi *= (1 - this.dampingFactor);
        panOff.multiplyScalar(1 - this.dampingFactor);
      } else { sphD.set(0,0,0); panOff.set(0,0,0); }
      scale = 1;
    };

    dom.addEventListener("mousedown", e => {
      if (e.button === 0) { state = 1; rStart.set(e.clientX, e.clientY); }
      else if (e.button === 2) { state = 2; pStart.set(e.clientX, e.clientY); }
    });
    dom.addEventListener("mousemove", e => {
      if (state === 1) {
        sphD.theta -= 2*Math.PI*(e.clientX-rStart.x)/dom.clientWidth*this.rotateSpeed;
        sphD.phi -= 2*Math.PI*(e.clientY-rStart.y)/dom.clientHeight*this.rotateSpeed;
        rStart.set(e.clientX, e.clientY);
      } else if (state === 2) {
        let d = new THREE.Vector3().copy(cam.position).sub(this.target).length();
        let pL = new THREE.Vector3().setFromMatrixColumn(cam.matrix, 0).multiplyScalar(-2*(e.clientX-pStart.x)*d/dom.clientWidth*this.panSpeed);
        let pU = new THREE.Vector3().setFromMatrixColumn(cam.matrix, 1).multiplyScalar(2*(e.clientY-pStart.y)*d/dom.clientHeight*this.panSpeed);
        panOff.add(pL).add(pU); pStart.set(e.clientX, e.clientY);
      }
    });
    dom.addEventListener("mouseup", () => { state = 0; });
    dom.addEventListener("wheel", e => { scale *= e.deltaY > 0 ? 1/0.95 : 0.95; }, { passive: true });
    dom.addEventListener("contextmenu", e => e.preventDefault());
  };
}

// ── Render loop ─────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (controls) controls.update();
  if (renderer && scene && camera) renderer.render(scene, camera);
}

document.addEventListener("DOMContentLoaded", init);
</script>
