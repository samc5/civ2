<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP Point Cloud + Asset Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }

    /* Loading overlay */
    #loading_overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(20,20,20,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #ddd; font-size: 16px;
    }
    #loading_overlay.hidden { display: none; }
    #loading_bar_outer {
      width: 320px; height: 8px; background: #333;
      border-radius: 4px; margin-top: 16px; overflow: hidden;
    }
    #loading_bar { height: 100%; width: 0%; background: #4ec9b0;
      transition: width 0.3s ease; border-radius: 4px; }
    #loading_status { margin-top: 10px; font-size: 13px; color: #aaa; }

    /* Asset info panel */
    #info_panel {
      position: fixed; top: 16px; right: 16px; z-index: 500;
      width: 300px; background: rgba(30,30,30,0.95);
      border: 1px solid #444; border-radius: 8px;
      padding: 12px; color: #ddd; font-size: 13px;
      display: none;
    }
    #info_panel.visible { display: block; }
    #info_panel h3 { margin: 0 0 8px; font-size: 14px; color: #4ec9b0; }
    #info_panel img { width: 100%; border-radius: 4px; margin-bottom: 8px;
      max-height: 200px; object-fit: cover; display: block; }
    #info_panel table { width: 100%; border-collapse: collapse; }
    #info_panel td { padding: 3px 6px; vertical-align: top; }
    #info_panel td:first-child { color: #888; white-space: nowrap; width: 40%; }
    #info_close { float: right; cursor: pointer; color: #888; font-size: 16px;
      line-height: 1; margin: -4px -4px 0 0; }
    #info_close:hover { color: #fff; }

    /* Asset type legend/sidebar panel */
    #asset_sidebar {
      position: fixed; bottom: 16px; left: 270px; z-index: 400;
      background: rgba(30,30,30,0.92); border: 1px solid #444;
      border-radius: 8px; padding: 10px 14px; color: #ddd;
      max-height: 60vh; overflow-y: auto; font-size: 12px;
      min-width: 200px;
    }
    #asset_sidebar h4 { margin: 0 0 8px; font-size: 13px; color: #4ec9b0;
      border-bottom: 1px solid #333; padding-bottom: 6px; }
    .asset_row { display: flex; align-items: center; margin-bottom: 4px; cursor: pointer; }
    .asset_row:hover { background: rgba(255,255,255,0.05); border-radius: 3px; }
    .asset_swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-right: 8px; }
    .asset_label { flex: 1; }
    .asset_count { color: #666; margin-left: 6px; }
    .asset_row input[type=checkbox] { margin-right: 6px; cursor: pointer; }

    /* CRS info */
    #crs_badge {
      position: fixed; bottom: 8px; right: 8px; z-index: 300;
      background: rgba(0,0,0,0.6); color: #888; font-size: 11px;
      padding: 3px 8px; border-radius: 4px; display: none;
    }

    /* Error toast */
    #error_toast {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      z-index: 600; background: #8b0000; color: #fff;
      padding: 10px 18px; border-radius: 6px; font-size: 13px;
      display: none; max-width: 500px; text-align: center;
    }
  </style>
</head>
<body>

<!-- Potree required containers -->
<div id="potree_render_area"></div>
<div id="potree_sidebar_container"></div>

<!-- Loading overlay -->
<div id="loading_overlay">
  <div id="loading_message">Initializing viewer…</div>
  <div id="loading_bar_outer"><div id="loading_bar"></div></div>
  <div id="loading_status"></div>
</div>

<!-- Asset info panel -->
<div id="info_panel">
  <span id="info_close" title="Close">✕</span>
  <h3 id="info_type">—</h3>
  <img id="info_img" src="" alt="" style="display:none">
  <table id="info_table"><tbody></tbody></table>
</div>

<!-- Asset type sidebar -->
<div id="asset_sidebar">
  <h4>Asset Types</h4>
  <div id="asset_type_list"></div>
</div>

<!-- CRS badge -->
<div id="crs_badge"></div>
<!-- Error toast -->
<div id="error_toast"></div>

<script>
// =============================================================================
// CONFIGURATION — change POTREE_PATH to match your local Potree installation
// =============================================================================
const POTREE_PATH = "../potree-1.8"; // e.g. "../potree-1.8" or "./potree-1.8"
// =============================================================================

// Asset type color map — 27 types
const COLOR_MAP = {
  VALVE_COVER:            "#e74c3c",
  MANHOLE_COVER:          "#3498db",
  CATCH_BASIN:            "#2980b9",
  RAMP:                   "#2ecc71",
  DRIVEWAY:               "#f39c12",
  CURB:                   "#e67e22",
  SIDEWALK:               "#95a5a6",
  PLANTER:                "#27ae60",
  TRASH_BIN:              "#7f8c8d",
  BUS_STOP:               "#f1c40f",
  CABINET:                "#d35400",
  HYDRANT:                "#c0392b",
  CCTV:                   "#8e44ad",
  TREE:                   "#1e8449",
  BUS_SHELTER:            "#e91e63",
  BIKE_RACK:              "#00bcd4",
  BOX:                    "#795548",
  BENCH:                  "#a0522d",
  UTILITY_POLE:           "#9e9e9e",
  SIGNAL_POLE:            "#ff9800",
  FENCE:                  "#bc8f8f",
  RETAINING_WALL:         "#607d8b",
  PEDESTRIAN_PUSH_BUTTON: "#00acc1",
  TRAFFIC_SIGNAL:         "#f44336",
  FLASHER:                "#ff4081",
  LUMINARIES:             "#ffd54f",
  JERSEY_BARRIER:         "#bdbdbd",
};

function colorHexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return {r, g, b};
}

// ---- Script/CSS loader -------------------------------------------------------
function loadCSS(href) {
  return new Promise(resolve => {
    const link = document.createElement("link");
    link.rel = "stylesheet"; link.type = "text/css"; link.href = href;
    link.onload = resolve; link.onerror = resolve; // continue on error
    document.head.appendChild(link);
  });
}

function loadScript(src) {
  return new Promise(resolve => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = () => { console.warn("Could not load:", src); resolve(); };
    document.head.appendChild(s);
  });
}

async function loadDependencies() {
  setLoadingMsg("Loading Potree libraries…");

  // CSS (fire and forget — non-blocking render)
  loadCSS(POTREE_PATH + "/build/potree/potree.css");
  loadCSS(POTREE_PATH + "/libs/jquery-ui/jquery-ui.min.css");
  loadCSS(POTREE_PATH + "/libs/spectrum/spectrum.css");
  loadCSS(POTREE_PATH + "/libs/jstree/themes/mixed/style.css");

  // JS — must be sequential because of inter-dependencies
  const scripts = [
    POTREE_PATH + "/libs/jquery/jquery-3.1.1.min.js",
    POTREE_PATH + "/libs/spectrum/spectrum.js",
    POTREE_PATH + "/libs/jquery-ui/jquery-ui.min.js",
    POTREE_PATH + "/libs/three.js/build/three.min.js",
    POTREE_PATH + "/libs/other/BinaryHeap.js",
    POTREE_PATH + "/libs/tween/tween.min.js",
    POTREE_PATH + "/libs/d3/d3.min.js",
    POTREE_PATH + "/libs/proj4/proj4.js",
    POTREE_PATH + "/libs/openlayers3/ol.js",
    POTREE_PATH + "/libs/i18n/i18next.xhr-backend.min.js",
    POTREE_PATH + "/libs/jstree/jstree.min.js",
    POTREE_PATH + "/build/potree/potree.js",
    POTREE_PATH + "/libs/plasio/js/laslaz.js",
  ];

  for (const src of scripts) {
    await loadScript(src);
  }
}

// ---- UI helpers ---------------------------------------------------------------
function setLoadingMsg(msg, status) {
  document.getElementById("loading_message").textContent = msg;
  if (status !== undefined) {
    document.getElementById("loading_status").textContent = status;
  }
}

function setLoadingProgress(loaded, total) {
  const pct = total > 0 ? Math.round((loaded / total) * 100) : 0;
  document.getElementById("loading_bar").style.width = pct + "%";
  document.getElementById("loading_status").textContent = `${loaded} / ${total} tiles loaded`;
}

function hideLoading() {
  document.getElementById("loading_overlay").classList.add("hidden");
}

function showError(msg) {
  const el = document.getElementById("error_toast");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 6000);
}

// ---- CRS detection -----------------------------------------------------------
function detectCRS(pointcloud) {
  // Gather bounding box info from multiple possible locations
  let rawCenter = null;

  try {
    // Option 1: pcoGeometry tightBoundingBox with offset
    const pco = pointcloud.pcoGeometry;
    if (pco) {
      const off = pco.offset || {x:0,y:0,z:0};
      const bb  = pco.tightBoundingBox || pco.boundingBox;
      if (bb) {
        const c = new THREE.Vector3();
        bb.getCenter(c);
        rawCenter = { x: c.x + off.x, y: c.y + off.y, z: c.z + off.z };
      }
    }
  } catch(e) { /* ignore */ }

  if (!rawCenter) {
    try {
      // Option 2: pointcloud.position itself holds the scene translation
      rawCenter = {
        x: pointcloud.position.x,
        y: pointcloud.position.y,
        z: pointcloud.position.z,
      };
    } catch(e) { /* ignore */ }
  }

  if (!rawCenter) {
    try {
      // Option 3: geometry bounding box
      const bb = pointcloud.geometry && pointcloud.geometry.boundingBox;
      if (bb) {
        const c = new THREE.Vector3();
        bb.getCenter(c);
        rawCenter = { x: c.x, y: c.y, z: c.z };
      }
    } catch(e) { /* ignore */ }
  }

  const x = rawCenter ? rawCenter.x : 0;
  const z = rawCenter ? rawCenter.z : 0;

  console.log("CRS detection — rawCenter:", rawCenter);

  // UTM Zone 19N: x roughly 280 000 – 400 000 and larger than MA State Plane
  if (x > 280000 && x < 420000) {
    console.log("Detected CRS: UTM Zone 19N (EPSG:32619)");
    return {
      name: "UTM19N",
      proj4def: "+proj=utm +zone=19 +datum=WGS84 +units=m +no_defs",
      zRef: z,
    };
  }
  // MA State Plane: x roughly 180 000 – 280 000
  if (x > 180000 && x < 280000) {
    console.log("Detected CRS: MA State Plane (EPSG:26987)");
    return {
      name: "MASP",
      proj4def: "+proj=lcc +lat_1=42.68333333333333 +lat_2=41.71666666666667" +
                " +lat_0=41 +lon_0=-71.5 +x_0=200000 +y_0=750000" +
                " +ellps=GRS80 +datum=NAD83 +units=m +no_defs",
      zRef: z,
    };
  }
  // Geographic / near-zero (WGS84 passthrough or offset-corrected)
  if (Math.abs(x) < 180) {
    console.log("Detected CRS: WGS84 geographic (passthrough)");
    return { name: "WGS84", proj4def: null, zRef: z };
  }

  // Fallback: assume UTM 19N for this region
  console.warn("CRS detection inconclusive (x=" + x + "), defaulting to UTM 19N");
  return {
    name: "UTM19N",
    proj4def: "+proj=utm +zone=19 +datum=WGS84 +units=m +no_defs",
    zRef: 0,
  };
}

function transformWGS84(lon, lat, crs) {
  if (!crs || !crs.proj4def) return [lon, lat];
  try {
    proj4.defs("LOCAL_CRS", crs.proj4def);
    return proj4("WGS84", "LOCAL_CRS", [lon, lat]);
  } catch(e) {
    console.warn("proj4 transform failed:", e);
    return [lon, lat];
  }
}

// ---- Asset markers -----------------------------------------------------------
const assetGroups = new Map(); // type → { points: THREE.Points, features: [] }

function createAssetMarkers(assetsData, scene, crs) {
  // Group features by asset_type
  const groups = {};
  for (const f of assetsData.features) {
    const type = f.properties.asset_type || "UNKNOWN";
    if (!groups[type]) groups[type] = [];
    groups[type].push(f);
  }

  const color = new THREE.Color();

  for (const [type, features] of Object.entries(groups)) {
    const hex   = COLOR_MAP[type] || "#ffffff";
    const rgb   = colorHexToRgb(hex);
    const count = features.length;

    const positions = new Float32Array(count * 3);
    const colors    = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
      const f  = features[i];
      const g  = f.geometry;
      let lon, lat;

      if (g.type === "Point") {
        [lon, lat] = g.coordinates;
      } else if (g.type === "LineString") {
        // midpoint
        const coords = g.coordinates;
        const mid = (coords.length - 1) / 2;
        const lo  = Math.floor(mid);
        const hi  = Math.min(lo + 1, coords.length - 1);
        const t   = mid - lo;
        lon = coords[lo][0] + t * (coords[hi][0] - coords[lo][0]);
        lat = coords[lo][1] + t * (coords[hi][1] - coords[lo][1]);
      } else {
        lon = f.geometry.coordinates[0];
        lat = f.geometry.coordinates[1];
      }

      const [px, py] = transformWGS84(lon, lat, crs);
      positions[i*3]   = px;
      positions[i*3+1] = py;
      positions[i*3+2] = crs.zRef + 2; // 2 m above the detected z reference

      colors[i*3]   = rgb.r;
      colors[i*3+1] = rgb.g;
      colors[i*3+2] = rgb.b;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geo.setAttribute("color",    new THREE.BufferAttribute(colors,    3));

    const mat = new THREE.PointsMaterial({
      size: 8,
      sizeAttenuation: false, // constant pixel size
      vertexColors: true,
      depthTest: true,
      depthWrite: false,
    });

    const pts = new THREE.Points(geo, mat);
    pts.name  = "assets_" + type;

    scene.add(pts);
    assetGroups.set(type, { points: pts, features, hex, count });
  }

  console.log("Created asset markers for", Object.keys(groups).length, "types,",
              assetsData.features.length, "total features");
}

// ---- Click → info panel ------------------------------------------------------
let lastCRS = null;

function setupClickHandler(viewer) {
  const canvas = viewer.renderer.domElement;

  canvas.addEventListener("click", e => {
    const rect  = canvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) * (canvas.width  / rect.width);
    const mouseY = (e.clientY - rect.top)  * (canvas.height / rect.height);

    const camera = viewer.scene.getActiveCamera();
    if (!camera) return;

    let bestFeature = null;
    let bestDist    = Infinity;
    const THRESHOLD_PX = 18;

    for (const [, group] of assetGroups) {
      if (!group.points.visible) continue;

      const pos = group.points.geometry.getAttribute("position");
      const mat = group.points.matrixWorld;

      for (let i = 0; i < pos.count; i++) {
        const world = new THREE.Vector3(
          pos.getX(i), pos.getY(i), pos.getZ(i)
        );
        world.applyMatrix4(mat);

        const clip = world.clone().project(camera);
        if (clip.z > 1) continue; // behind camera

        const sx = (clip.x +  1) / 2 * canvas.width;
        const sy = (-clip.y + 1) / 2 * canvas.height;
        const d  = Math.sqrt((sx - mouseX)**2 + (sy - mouseY)**2);

        if (d < bestDist) {
          bestDist    = d;
          bestFeature = group.features[i];
        }
      }
    }

    if (bestFeature && bestDist < THRESHOLD_PX) {
      showInfoPanel(bestFeature);
    } else {
      hideInfoPanel();
    }
  });
}

function showInfoPanel(feature) {
  const p   = feature.properties;
  const panel = document.getElementById("info_panel");

  document.getElementById("info_type").textContent = p.asset_type || "Asset";

  const img = document.getElementById("info_img");
  if (p.image_url) {
    img.src = p.image_url; img.style.display = "block";
  } else {
    img.src = ""; img.style.display = "none";
  }

  const fields = [
    ["Feature ID",  p.feature_id    || "—"],
    ["Condition",   p.condition     || "—"],
    ["Tile",        p.tile_file     || "—"],
    ["Dataset",     p.street_dataset|| "—"],
    ["Type",        p.Type          || "—"],
    ["Material",    p.Material      || "—"],
  ];

  const tbody = document.querySelector("#info_table tbody");
  tbody.innerHTML = "";
  for (const [label, value] of fields) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${label}</td><td>${value}</td>`;
    tbody.appendChild(tr);
  }

  panel.classList.add("visible");
}

function hideInfoPanel() {
  document.getElementById("info_panel").classList.remove("visible");
}

// ---- Asset type sidebar ------------------------------------------------------
function buildSidebar() {
  const list = document.getElementById("asset_type_list");
  list.innerHTML = "";

  // Sort by count descending
  const sorted = [...assetGroups.entries()]
    .sort((a,b) => b[1].count - a[1].count);

  for (const [type, group] of sorted) {
    const row = document.createElement("div");
    row.className = "asset_row";

    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = true;
    cb.addEventListener("change", () => {
      group.points.visible = cb.checked;
    });

    const swatch = document.createElement("div");
    swatch.className = "asset_swatch";
    swatch.style.background = group.hex;

    const label = document.createElement("span");
    label.className = "asset_label";
    label.textContent = type.replace(/_/g, " ");

    const count = document.createElement("span");
    count.className = "asset_count";
    count.textContent = "(" + group.count + ")";

    row.appendChild(cb);
    row.appendChild(swatch);
    row.appendChild(label);
    row.appendChild(count);
    list.appendChild(row);

    // Clicking the row toggles checkbox
    row.addEventListener("click", ev => {
      if (ev.target !== cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event("change")); }
    });
  }
}

// ---- Main entry point --------------------------------------------------------
async function main() {
  try {
    await loadDependencies();

    // Verify Potree loaded
    if (typeof Potree === "undefined") {
      throw new Error("Potree not found. Check POTREE_PATH (currently: '" + POTREE_PATH +
                      "'). Open a terminal, cd to this project folder, and run:\n" +
                      "  python3 -m http.server 8080\nThen open http://localhost:8080/viewer.html");
    }

    setLoadingMsg("Initialising viewer…");

    // Create Potree viewer
    const viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
    viewer.setEDLEnabled(true);
    viewer.setFOV(60);
    viewer.setPointBudget(5_000_000);
    viewer.setBackground("gradient");
    viewer.loadGUI(() => {
      viewer.setLanguage("en");
    });

    // Expose viewer for debugging
    window._viewer = viewer;

    // Fetch data files concurrently
    setLoadingMsg("Loading tile and asset data…");
    let tilesData, assetsData;
    try {
      [tilesData, assetsData] = await Promise.all([
        fetch("pointcloudjp.json").then(r => {
          if (!r.ok) throw new Error("Cannot load pointcloudjp.json: " + r.status);
          return r.json();
        }),
        fetch("assets_with_tiles.geojson").then(r => {
          if (!r.ok) {
            console.warn("assets_with_tiles.geojson not found — run spatial_join.py first");
            return null;
          }
          return r.json();
        }),
      ]);
    } catch(e) {
      showError(e.message);
      throw e;
    }

    const tiles = tilesData.features;
    const total = tiles.length;
    let loadedCount  = 0;
    let crs          = null;
    let markersAdded = false;
    let firstCloud   = null;

    function tryAddMarkers() {
      if (markersAdded) return;
      if (!crs || !assetsData) return;
      markersAdded = true;
      createAssetMarkers(assetsData, viewer.scene.scene, crs);
      buildSidebar();
      const badge = document.getElementById("crs_badge");
      badge.textContent = "CRS: " + crs.name;
      badge.style.display = "block";
    }

    function onCloudLoaded(e, tile) {
      const pc = e.pointcloud;

      try {
        viewer.scene.addPointCloud(pc);
      } catch(err) {
        console.warn("addPointCloud failed:", err);
        try { viewer.scene.scene.add(pc); } catch(e2) { /* ignore */ }
      }

      loadedCount++;
      setLoadingProgress(loadedCount, total);

      if (loadedCount === 1) {
        firstCloud = pc;

        // Fly camera to first loaded cloud
        try {
          const bb = new THREE.Box3();
          bb.setFromObject(pc);
          if (!bb.isEmpty()) {
            const c  = new THREE.Vector3();
            bb.getCenter(c);
            const sz = bb.getSize(new THREE.Vector3());
            viewer.scene.view.setView(
              new THREE.Vector3(c.x, c.y - sz.y, c.z + sz.z * 1.5),
              c
            );
          }
        } catch(e) { console.warn("Camera fly failed:", e); }

        // Detect CRS
        crs = detectCRS(pc);
        lastCRS = crs;
        tryAddMarkers();
      }

      if (loadedCount === total) {
        setLoadingMsg("All tiles loaded.");
        setTimeout(hideLoading, 1200);
      }
    }

    // Load all 47 LAZ tiles
    setLoadingMsg(`Loading ${total} point cloud tiles…`, "0 / " + total);
    for (const tile of tiles) {
      const p   = tile.properties;
      const url = p.baseUrl + p.lasPath;
      const name = p.filename_no_ext || p.filename;

      try {
        Potree.loadPointCloud(url, name, e => onCloudLoaded(e, tile));
      } catch(e) {
        console.warn("loadPointCloud threw for", name, e);
        loadedCount++;
        setLoadingProgress(loadedCount, total);
      }
    }

    // If assets fetched but CRS detection takes time, wait 10s then force markers
    // using a fallback UTM 19N (correct for this Jamaica Plain dataset)
    setTimeout(() => {
      if (!crs) {
        console.warn("CRS not detected after 10 s — using UTM 19N fallback");
        crs = {
          name: "UTM19N (fallback)",
          proj4def: "+proj=utm +zone=19 +datum=WGS84 +units=m +no_defs",
          zRef: 15, // reasonable above-ground height for Jamaica Plain
        };
      }
      tryAddMarkers();
    }, 10000);

    // Canvas click → asset info
    setupClickHandler(viewer);

    // Close button on info panel
    document.getElementById("info_close").addEventListener("click", hideInfoPanel);

  } catch(err) {
    console.error("Viewer init failed:", err);
    document.getElementById("loading_message").textContent = "Error: " + err.message;
    document.getElementById("loading_message").style.color = "#e74c3c";
  }
}

// Start after DOM is ready
document.addEventListener("DOMContentLoaded", main);
</script>

</body>
</html>
